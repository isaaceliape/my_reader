<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local TTS - my_reader</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .status.ok {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="range"] {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .speed-display {
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .audio-player {
            margin-top: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }

        .audio-player.visible {
            display: block;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 Local TTS</h1>
        <p class="subtitle">Text-to-Speech powered by Kokoro - runs 100% locally on your M1</p>

        <div id="status" class="status">Checking...</div>

        <textarea 
            id="textInput" 
            placeholder="Type or paste your text here..."
            maxlength="5000"
        ></textarea>
        <div class="char-count"><span id="charCount">0</span> / 5000 characters</div>

        <div class="controls">
            <div class="control-group">
                <label for="voiceSelect">Voice</label>
                <select id="voiceSelect">
                    <option value="af_heart">Heart (Female)</option>
                    <option value="af_sarah">Sarah (Female)</option>
                    <option value="am_adam">Adam (Male)</option>
                    <option value="am_michael">Michael (Male)</option>
                    <option value="bf_emma">Emma (British Female)</option>
                    <option value="bf_isabella">Isabella (British Female)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="speedRange">Speed: <span id="speedDisplay" class="speed-display">1.0x</span></label>
                <input 
                    type="range" 
                    id="speedRange" 
                    min="0.5" 
                    max="2.0" 
                    step="0.1" 
                    value="1.0"
                >
            </div>
        </div>

        <div class="button-group">
            <button id="playBtn" class="btn-primary">
                <span>▶</span>
                <span>Generate & Play</span>
            </button>
            <button id="downloadBtn" class="btn-secondary" disabled>
                <span>⬇</span>
                <span>Download</span>
            </button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="audioPlayer" class="audio-player">
            <label>Audio Player</label>
            <audio id="audioElement" controls></audio>
        </div>
    </div>

    <script>
        const API_BASE = '';

        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedRange = document.getElementById('speedRange');
        const speedDisplay = document.getElementById('speedDisplay');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioElement = document.getElementById('audioElement');
        const statusEl = document.getElementById('status');
        const errorMessage = document.getElementById('errorMessage');

        let lastGeneratedBlob = null;

        // Update character count
        textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length;
        });

        // Update speed display
        speedRange.addEventListener('input', () => {
            speedDisplay.textContent = `${speedRange.value}x`;
        });

        // Check API status on load
        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/api`);
                const data = await response.json();
                
                if (data.tts_loaded) {
                    statusEl.className = 'status ok';
                    statusEl.textContent = '✓ TTS Ready';
                } else {
                    statusEl.className = 'status error';
                    statusEl.textContent = '⚠ Loading TTS...';
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '✗ Server Offline';
            }
        }

        // Generate and play audio
        playBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            
            if (!text) {
                showError('Please enter some text');
                return;
            }

            setLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_BASE}/tts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        voice: voiceSelect.value,
                        speed: parseFloat(speedRange.value)
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Generation failed');
                }

                const blob = await response.blob();
                lastGeneratedBlob = blob;
                
                const audioUrl = URL.createObjectURL(blob);
                audioElement.src = audioUrl;
                audioPlayer.classList.add('visible');
                
                // Enable download button
                downloadBtn.disabled = false;
                
                // Auto-play
                await audioElement.play();
                
            } catch (error) {
                showError(error.message);
            } finally {
                setLoading(false);
            }
        });

        // Download audio
        downloadBtn.addEventListener('click', () => {
            if (!lastGeneratedBlob) return;
            
            const url = URL.createObjectURL(lastGeneratedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `speech-${Date.now()}.wav`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        function setLoading(loading) {
            playBtn.disabled = loading;
            downloadBtn.disabled = loading || !lastGeneratedBlob;
            
            if (loading) {
                playBtn.innerHTML = '<span class="loading"></span><span>Generating...</span>';
            } else {
                playBtn.innerHTML = '<span>▶</span><span>Generate & Play</span>';
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
        }

        function hideError() {
            errorMessage.classList.remove('visible');
        }

        // Initialize
        checkStatus();
    </script>
</body>
</html>
