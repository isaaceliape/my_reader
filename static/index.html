<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local TTS - my_reader</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .status.ok {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 20px 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input[type="range"] {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .speed-display {
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .audio-player {
            margin-top: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }

        .audio-player.visible {
            display: block;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Generation Progress Bar */
        .generation-progress {
            margin-top: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            border: 1px solid #dee2e6;
            display: none;
        }

        .generation-progress.visible {
            display: block;
        }

        .generation-progress-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .generation-progress-bar {
            width: 100%;
            height: 8px;
            background: #dee2e6;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .generation-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .generation-progress-stages {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }

        .generation-progress-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .generation-progress-stage-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            transition: all 0.3s ease;
        }

        .generation-progress-stage.active .generation-progress-stage-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            animation: pulse 1.5s infinite;
        }

        .generation-progress-stage.completed .generation-progress-stage-icon {
            background: #28a745;
            color: white;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 400px;
            pointer-events: none;
        }

        .toast {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            min-width: 300px;
            max-width: 400px;
            pointer-events: auto;
            animation: slideIn 0.3s ease forwards;
            border-left: 4px solid;
            opacity: 0;
            transform: translateX(100%);
        }

        .toast.toast-hidden {
            animation: slideOut 0.3s ease forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }

        .toast-content {
            flex: 1;
            min-width: 0;
        }

        .toast-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }

        .toast-message {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .toast-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #999;
            font-size: 16px;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .toast-close:hover {
            color: #333;
        }

        /* Toast Types */
        .toast-error {
            border-left-color: #dc3545;
        }

        .toast-error .toast-icon {
            background: #dc3545;
            color: white;
        }

        .toast-error .toast-title {
            color: #dc3545;
        }

        .toast-success {
            border-left-color: #28a745;
        }

        .toast-success .toast-icon {
            background: #28a745;
            color: white;
        }

        .toast-success .toast-title {
            color: #28a745;
        }

        .toast-warning {
            border-left-color: #ffc107;
        }

        .toast-warning .toast-icon {
            background: #ffc107;
            color: #333;
        }

        .toast-warning .toast-title {
            color: #ffc107;
        }

        .toast-info {
            border-left-color: #17a2b8;
        }

        .toast-info .toast-icon {
            background: #17a2b8;
            color: white;
        }

        .toast-info .toast-title {
            color: #17a2b8;
        }

        /* Mobile Responsive */
        @media (max-width: 640px) {
            .toast-container {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }

            .toast {
                min-width: auto;
                max-width: none;
            }
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 640px) {
            body {
                padding: 16px 12px;
            }

            .container {
                padding: 24px 20px;
                border-radius: 12px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 13px;
                margin-bottom: 20px;
            }

            .url-input-group {
                flex-direction: column;
                gap: 10px;
            }

            .url-input-group input[type="url"] {
                width: 100%;
            }

            .btn-process {
                width: 100%;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
            }

            button {
                width: 100%;
                padding: 12px 20px;
                font-size: 15px;
            }

            textarea {
                min-height: 150px;
                font-size: 16px; /* Prevents iOS zoom on focus */
                padding: 12px;
            }

            .audio-player {
                padding: 16px;
            }

            .generation-progress {
                padding: 12px;
            }

            .generation-progress-title {
                font-size: 13px;
            }

            .generation-progress-stages {
                font-size: 10px;
            }

            .generation-progress-stage-icon {
                width: 20px;
                height: 20px;
                font-size: 10px;
            }

        /* Custom Audio Player Styles */
        .custom-audio-player {
            margin-top: 24px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            display: none;
            border: 1px solid #dee2e6;
        }

        .custom-audio-player.visible {
            display: block;
        }

        .audio-progress-container {
            margin-bottom: 16px;
        }

        .audio-progress-bar {
            width: 100%;
            height: 6px;
            background: #dee2e6;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .audio-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .audio-time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-family: 'SF Mono', 'Consolas', monospace;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .audio-btn {
            background: white;
            border: 2px solid #667eea;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
            color: #667eea;
        }

        .audio-btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .audio-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .audio-btn.btn-large {
            width: 56px;
            height: 56px;
            font-size: 24px;
        }

        .audio-btn.btn-stop {
            border-color: #dc3545;
            color: #dc3545;
        }

        .audio-btn.btn-stop:hover:not(:disabled) {
            background: #dc3545;
            color: white;
        }

        .audio-btn.btn-rewind,
        .audio-btn.btn-forward {
            width: 40px;
            height: 40px;
            font-size: 16px;
        }

        /* Hide default audio element */
        audio {
            display: none;
        }

            .preview-section {
                padding: 16px;
            }

            .preview-title {
                font-size: 16px;
            }

            .preview-text {
                font-size: 13px;
                max-height: 150px;
            }

            .url-actions {
                flex-direction: column;
                gap: 10px;
            }

            .url-actions button {
                width: 100%;
            }

            #newUrlBtn {
                flex: 1;
            }
        }

        /* Prevent horizontal overflow */
        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }

        .container {
            max-width: 100%;
            overflow-x: hidden;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .url-section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .url-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .url-input-group input[type="url"] {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .url-input-group input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-process {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-process:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .loading-stages {
            display: none;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .loading-stages.visible {
            display: block;
        }

        .loading-stages .stage {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            color: #999;
        }

        .loading-stages .stage.active {
            color: #667eea;
            font-weight: 600;
        }

        .loading-stages .stage.completed {
            color: #155724;
        }

        .loading-stages .stage-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid currentColor;
        }

        .loading-stages .stage.active .stage-icon {
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        .loading-stages .stage.completed .stage-icon {
            background: #155724;
            border-color: #155724;
        }

        .loading-stages .stage.completed .stage-icon::after {
            content: '✓';
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-section {
            display: none;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .preview-section.visible {
            display: block;
        }

        .preview-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .preview-text {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }

        .cache-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-left: 10px;
            font-weight: 600;
        }

        .cache-status.hit {
            background: #d4edda;
            color: #155724;
        }

        .cache-status.miss {
            background: #fff3cd;
            color: #856404;
        }

        .url-actions {
            display: flex;
            gap: 12px;
        }

        .btn-audio {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-audio:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 Local TTS</h1>
        <p class="subtitle">Text-to-Speech powered by Kokoro - runs 100% locally on your M1</p>

        <div id="status" class="status">Checking...</div>

        <!-- URL to Audio Section -->
        <div class="url-section">
            <h2 style="font-size: 18px; color: #333; margin-bottom: 16px;">URL to Audio</h2>
            
            <div class="url-input-group">
                <input 
                    type="url" 
                    id="urlInput" 
                    placeholder="Cole URL do artigo..."
                >
                <button id="processUrlBtn" class="btn-process">
                    <span>Processar URL</span>
                </button>
            </div>

            <div id="loadingStages" class="loading-stages">
                <div class="stage" id="stageFetching">
                    <div class="stage-icon"></div>
                    <span>Buscando conteúdo...</span>
                </div>
                <div class="stage" id="stageExtracting">
                    <div class="stage-icon"></div>
                    <span>Extraindo artigo...</span>
                </div>
                <div class="stage" id="stageReady">
                    <div class="stage-icon"></div>
                    <span>Pronto para gerar áudio</span>
                </div>
            </div>

            <div id="previewSection" class="preview-section">
                <div class="preview-title">
                    <span id="previewTitle"></span>
                    <span id="cacheStatus" class="cache-status"></span>
                </div>
                <div id="previewText" class="preview-text"></div>
                
                <div class="url-actions" style="margin-top: 16px;">
                    <button id="generateAudioBtn" class="btn-audio btn-process" disabled>
                        <span>🔊</span>
                        <span>Gerar Áudio</span>
                    </button>
                    <button id="newUrlBtn" class="btn-secondary" style="flex: 0; padding: 14px 20px;">
                        <span>Nova URL</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Manual Text Input Section -->
        <div class="manual-section">
            <h2 style="font-size: 18px; color: #333; margin-bottom: 16px;">Or Paste Text</h2>
            
            <textarea 
                id="textInput" 
                placeholder="Type or paste your text here..."
                maxlength="5000"
            ></textarea>
            <div class="char-count"><span id="charCount">0</span> / 5000 characters</div>

        <div class="controls">
            <div class="control-group">
                <label for="voiceSelect">Voice</label>
                <select id="voiceSelect">
                    <option value="af_heart">Heart (Female)</option>
                    <option value="af_sarah">Sarah (Female)</option>
                    <option value="am_adam">Adam (Male)</option>
                    <option value="am_michael">Michael (Male)</option>
                    <option value="bf_emma">Emma (British Female)</option>
                    <option value="bf_isabella">Isabella (British Female)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="speedRange">Speed: <span id="speedDisplay" class="speed-display">1.0x</span></label>
                <input 
                    type="range" 
                    id="speedRange" 
                    min="0.5" 
                    max="2.0" 
                    step="0.1" 
                    value="1.0"
                >
            </div>
        </div>

        <div class="button-group">
            <button id="playBtn" class="btn-primary">
                <i class="fas fa-play"></i>
                <span>Generate & Play</span>
            </button>
            <button id="downloadBtn" class="btn-secondary" disabled>
                <i class="fas fa-download"></i>
                <span>Download</span>
            </button>
        </div>

        <!-- Generation Progress Bar -->
        <div id="generationProgress" class="generation-progress">
            <div class="generation-progress-title">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span id="generationProgressText">Generating audio...</span>
            </div>
            <div class="generation-progress-bar">
                <div class="generation-progress-fill" id="generationProgressFill"></div>
            </div>
            <div class="generation-progress-stages">
                <div class="generation-progress-stage" id="stagePreparing">
                    <div class="generation-progress-stage-icon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <span>Preparing</span>
                </div>
                <div class="generation-progress-stage" id="stageGenerating">
                    <div class="generation-progress-stage-icon">
                        <i class="fas fa-wave-square"></i>
                    </div>
                    <span>Generating</span>
                </div>
                <div class="generation-progress-stage" id="stageFinalizing">
                    <div class="generation-progress-stage-icon">
                        <i class="fas fa-check"></i>
                    </div>
                    <span>Finalizing</span>
                </div>
            </div>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <!-- Custom Audio Player -->
        <div id="customAudioPlayer" class="custom-audio-player">
            <div class="audio-progress-container">
                <div class="audio-progress-bar" id="audioProgressBar">
                    <div class="audio-progress-fill" id="audioProgressFill"></div>
                </div>
                <div class="audio-time-display">
                    <span id="audioCurrentTime">0:00</span>
                    <span id="audioTotalTime">0:00</span>
                </div>
            </div>
            
            <div class="audio-controls">
                <button class="audio-btn btn-rewind" id="audioRewindBtn" title="Rewind 10s">
                    <i class="fas fa-backward"></i>
                </button>
                <button class="audio-btn btn-large" id="audioPlayPauseBtn" title="Play/Pause">
                    <i class="fas fa-play"></i>
                </button>
                <button class="audio-btn btn-stop" id="audioStopBtn" title="Stop">
                    <i class="fas fa-stop"></i>
                </button>
                <button class="audio-btn btn-forward" id="audioForwardBtn" title="Forward 10s">
                    <i class="fas fa-forward"></i>
                </button>
            </div>
            
            <!-- Hidden native audio element -->
            <audio id="audioElement"></audio>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '';

        // Toast notification functions
        function showToast(type, title, message, duration = 5000) {
            const container = document.getElementById('toastContainer');
            
            const icons = {
                error: 'fa-times-circle',
                success: 'fa-check-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fas ${icons[type]}"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;

            container.appendChild(toast);

            // Auto-remove after duration
            if (duration > 0) {
                setTimeout(() => {
                    if (toast.parentElement) {
                        toast.classList.add('toast-hidden');
                        setTimeout(() => {
                            if (toast.parentElement) {
                                toast.remove();
                            }
                        }, 300);
                    }
                }, duration);
            }

            return toast;
        }

        function showError(message, duration = 5000) {
            showToast('error', 'Error', message, duration);
        }

        function showSuccess(message, duration = 3000) {
            showToast('success', 'Success', message, duration);
        }

        function showWarning(message, duration = 4000) {
            showToast('warning', 'Warning', message, duration);
        }

        function showInfo(message, duration = 3000) {
            showToast('info', 'Info', message, duration);
        }

        // Clear all toasts
        function clearToasts() {
            const container = document.getElementById('toastContainer');
            container.innerHTML = '';
        }

        // URL section elements
        const urlInput = document.getElementById('urlInput');
        const processUrlBtn = document.getElementById('processUrlBtn');
        const loadingStages = document.getElementById('loadingStages');
        const stageFetching = document.getElementById('stageFetching');
        const stageExtracting = document.getElementById('stageExtracting');
        const stageReady = document.getElementById('stageReady');
        const previewSection = document.getElementById('previewSection');
        const previewTitle = document.getElementById('previewTitle');
        const previewText = document.getElementById('previewText');
        const cacheStatusEl = document.getElementById('cacheStatus');
        const generateAudioBtn = document.getElementById('generateAudioBtn');
        const newUrlBtn = document.getElementById('newUrlBtn');

        // Manual text section elements
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedRange = document.getElementById('speedRange');
        const speedDisplay = document.getElementById('speedDisplay');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const customAudioPlayer = document.getElementById('customAudioPlayer');
        const generationProgress = document.getElementById('generationProgress');
        const generationProgressFill = document.getElementById('generationProgressFill');
        const generationProgressText = document.getElementById('generationProgressText');
        const stagePreparing = document.getElementById('stagePreparing');
        const stageGenerating = document.getElementById('stageGenerating');
        const stageFinalizing = document.getElementById('stageFinalizing');
        const audioElement = document.getElementById('audioElement');
        const audioProgressBar = document.getElementById('audioProgressBar');
        const audioProgressFill = document.getElementById('audioProgressFill');
        const audioCurrentTimeEl = document.getElementById('audioCurrentTime');
        const audioTotalTimeEl = document.getElementById('audioTotalTime');
        const audioPlayPauseBtn = document.getElementById('audioPlayPauseBtn');
        const audioStopBtn = document.getElementById('audioStopBtn');
        const audioRewindBtn = document.getElementById('audioRewindBtn');
        const audioForwardBtn = document.getElementById('audioForwardBtn');
        const statusEl = document.getElementById('status');
        const errorMessage = document.getElementById('errorMessage');

        let lastGeneratedBlob = null;
        let currentArticleUrl = null;
        let currentArticleTitle = null;
        let currentArticleLanguage = null;

        // Update character count
        textInput.addEventListener('input', () => {
            charCount.textContent = textInput.value.length;
        });

        // Update speed display
        speedRange.addEventListener('input', () => {
            speedDisplay.textContent = `${speedRange.value}x`;
        });

        // Process URL button
        processUrlBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            
            if (!url) {
                showError('Please enter a URL');
                return;
            }

            // Reset state
            hideError();
            previewSection.classList.remove('visible');
            loadingStages.classList.add('visible');
            resetStages();

            try {
                // Stage 1: Fetching
                setActiveStage(stageFetching);
                
                const response = await fetch(`${API_BASE}/api/url`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: url,
                        voice: voiceSelect.value,
                        speed: parseFloat(speedRange.value)
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Failed to process URL');
                }

                // Stage 2: Extracting
                setActiveStage(stageExtracting);

                // Get metadata from headers
                const articleTitle = response.headers.get('X-Article-Title') || 'Untitled';
                const articleUrl = response.headers.get('X-Article-URL') || url;
                const cacheStatus = response.headers.get('X-Cache');
                const articleLanguage = response.headers.get('X-Article-Language');

                // Read the response body to get article text
                const blob = await response.blob();
                const text = await blob.text();

                // Stage 3: Ready
                setActiveStage(stageReady);
                markStageCompleted(stageFetching);
                markStageCompleted(stageExtracting);

                // Store article info
                currentArticleUrl = articleUrl;
                currentArticleTitle = articleTitle;
                currentArticleLanguage = articleLanguage;

                // Show preview
                previewTitle.textContent = articleTitle;
                
                // Truncate text to 300 words max
                const words = text.split(/\s+/);
                if (words.length > 300) {
                    previewText.textContent = words.slice(0, 300).join(' ') + '...';
                } else {
                    previewText.textContent = text;
                }

                // Show cache status
                if (cacheStatus === 'HIT') {
                    cacheStatusEl.textContent = 'Artigo em cache';
                    cacheStatusEl.className = 'cache-status hit';
                    showInfo('Article loaded from cache', 2000);
                } else {
                    cacheStatusEl.textContent = 'Artigo processado';
                    cacheStatusEl.className = 'cache-status miss';
                    showSuccess('Article processed successfully', 2000);
                }

                previewSection.classList.add('visible');
                generateAudioBtn.disabled = false;

            } catch (error) {
                showError(error.message);
                loadingStages.classList.remove('visible');
            }
        });

        // Generate audio from URL
        generateAudioBtn.addEventListener('click', async () => {
            if (!currentArticleUrl) return;

            setLoading(true);
            hideError();
            showGenerationProgress();

            try {
                // Stage 1: Preparing
                setGenerationStage('preparing');
                await new Promise(resolve => setTimeout(resolve, 300));

                const response = await fetch(`${API_BASE}/api/url`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: currentArticleUrl,
                        voice: voiceSelect.value,
                        speed: parseFloat(speedRange.value)
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Failed to generate audio');
                }

                // Stage 2: Generating
                setGenerationStage('generating');

                const blob = await response.blob();
                lastGeneratedBlob = blob;
                
                // Stage 3: Finalizing
                setGenerationStage('finalizing');
                
                const audioUrl = URL.createObjectURL(blob);
                audioElement.src = audioUrl;
                customAudioPlayer.classList.add('visible');
                
                downloadBtn.disabled = false;
                
                // Complete progress
                completeGenerationProgress();
                
                updatePlayPauseIcon(true);
                await audioElement.play();

            } catch (error) {
                showError(error.message);
                hideGenerationProgress();
            } finally {
                setLoading(false);
            }
        });

        // New URL button
        newUrlBtn.addEventListener('click', () => {
            urlInput.value = '';
            previewSection.classList.remove('visible');
            loadingStages.classList.remove('visible');
            generateAudioBtn.disabled = true;
            currentArticleUrl = null;
            currentArticleTitle = null;
        });

        function resetStages() {
            stageFetching.classList.remove('active', 'completed');
            stageExtracting.classList.remove('active', 'completed');
            stageReady.classList.remove('active', 'completed');
        }

        function setActiveStage(stage) {
            resetStages();
            stage.classList.add('active');
        }

        function markStageCompleted(stage) {
            stage.classList.remove('active');
            stage.classList.add('completed');
        }

        // Check API status on load
        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/api`);
                const data = await response.json();
                
                if (data.tts_loaded) {
                    statusEl.className = 'status ok';
                    statusEl.textContent = '✓ TTS Ready';
                } else {
                    statusEl.className = 'status error';
                    statusEl.textContent = '⚠ Loading TTS...';
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '✗ Server Offline';
            }
        }

        // Generate and play audio (manual text)
        playBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            
            if (!text) {
                showError('Please enter some text');
                return;
            }

            setLoading(true);
            hideError();
            showGenerationProgress();

            try {
                // Stage 1: Preparing
                setGenerationStage('preparing');
                await new Promise(resolve => setTimeout(resolve, 300));

                const response = await fetch(`${API_BASE}/tts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        voice: voiceSelect.value,
                        speed: parseFloat(speedRange.value)
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Generation failed');
                }

                // Stage 2: Generating
                setGenerationStage('generating');

                const blob = await response.blob();
                lastGeneratedBlob = blob;
                
                // Stage 3: Finalizing
                setGenerationStage('finalizing');
                
                const audioUrl = URL.createObjectURL(blob);
                audioElement.src = audioUrl;
                customAudioPlayer.classList.add('visible');
                
                // Enable download button
                downloadBtn.disabled = false;
                
                // Complete progress
                completeGenerationProgress();
                
                // Auto-play
                updatePlayPauseIcon(true);
                await audioElement.play();
                
            } catch (error) {
                showError(error.message);
                hideGenerationProgress();
            } finally {
                setLoading(false);
            }
        });

        // Download audio
        downloadBtn.addEventListener('click', () => {
            if (!lastGeneratedBlob) return;
            
            const url = URL.createObjectURL(lastGeneratedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `speech-${Date.now()}.wav`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        function setLoading(loading) {
            playBtn.disabled = loading;
            downloadBtn.disabled = loading || !lastGeneratedBlob;
            generateAudioBtn.disabled = loading;
            
            if (loading) {
                playBtn.innerHTML = '<span class="loading"></span><span>Generating...</span>';
            } else {
                playBtn.innerHTML = '<i class="fas fa-play"></i><span>Generate & Play</span>';
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
        }

        function hideError() {
            // Legacy function - kept for compatibility
            // Errors now use toast notifications
        }

        // Generation progress functions
        function showGenerationProgress() {
            generationProgress.classList.add('visible');
            generationProgressFill.style.width = '0%';
            resetGenerationStages();
            setGenerationStage('preparing');
        }

        function hideGenerationProgress() {
            generationProgress.classList.remove('visible');
        }

        function resetGenerationStages() {
            [stagePreparing, stageGenerating, stageFinalizing].forEach(stage => {
                stage.classList.remove('active', 'completed');
            });
        }

        function setGenerationStage(stage) {
            resetGenerationStages();
            
            if (stage === 'preparing') {
                stagePreparing.classList.add('active');
                generationProgressFill.style.width = '25%';
                generationProgressText.textContent = 'Preparing text...';
            } else if (stage === 'generating') {
                stagePreparing.classList.add('completed');
                stageGenerating.classList.add('active');
                generationProgressFill.style.width = '60%';
                generationProgressText.textContent = 'Generating audio with AI...';
            } else if (stage === 'finalizing') {
                stagePreparing.classList.add('completed');
                stageGenerating.classList.add('completed');
                stageFinalizing.classList.add('active');
                generationProgressFill.style.width = '90%';
                generationProgressText.textContent = 'Finalizing...';
            }
        }

        function completeGenerationProgress() {
            [stagePreparing, stageGenerating, stageFinalizing].forEach(stage => {
                stage.classList.add('completed');
                stage.classList.remove('active');
            });
            generationProgressFill.style.width = '100%';
            generationProgressText.textContent = 'Ready!';
            
            // Hide after a short delay
            setTimeout(() => {
                hideGenerationProgress();
            }, 1000);
        }

        // Format time as mm:ss
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Update audio progress bar and time display
        function updateAudioProgress() {
            const currentTime = audioElement.currentTime;
            const duration = audioElement.duration;
            
            if (duration > 0) {
                const progress = (currentTime / duration) * 100;
                audioProgressFill.style.width = `${progress}%`;
                audioCurrentTimeEl.textContent = formatTime(currentTime);
                audioTotalTimeEl.textContent = formatTime(duration);
            }
        }

        // Update play/pause button icon
        function updatePlayPauseIcon(isPlaying) {
            const icon = audioPlayPauseBtn.querySelector('i');
            if (isPlaying) {
                icon.classList.remove('fa-play');
                icon.classList.add('fa-pause');
            } else {
                icon.classList.remove('fa-pause');
                icon.classList.add('fa-play');
            }
        }

        // Custom audio player controls
        audioPlayPauseBtn.addEventListener('click', () => {
            if (audioElement.paused) {
                audioElement.play();
                updatePlayPauseIcon(true);
            } else {
                audioElement.pause();
                updatePlayPauseIcon(false);
            }
        });

        audioStopBtn.addEventListener('click', () => {
            audioElement.pause();
            audioElement.currentTime = 0;
            updatePlayPauseIcon(false);
            audioProgressFill.style.width = '0%';
            audioCurrentTimeEl.textContent = '0:00';
        });

        audioRewindBtn.addEventListener('click', () => {
            audioElement.currentTime = Math.max(0, audioElement.currentTime - 10);
        });

        audioForwardBtn.addEventListener('click', () => {
            audioElement.currentTime = Math.min(audioElement.duration, audioElement.currentTime + 10);
        });

        // Click on progress bar to seek
        audioProgressBar.addEventListener('click', (e) => {
            const rect = audioProgressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const duration = audioElement.duration;
            
            if (duration > 0) {
                audioElement.currentTime = (clickX / width) * duration;
            }
        });

        // Audio event listeners
        audioElement.addEventListener('timeupdate', updateAudioProgress);
        
        audioElement.addEventListener('loadedmetadata', () => {
            audioTotalTimeEl.textContent = formatTime(audioElement.duration);
        });

        audioElement.addEventListener('ended', () => {
            updatePlayPauseIcon(false);
            audioProgressFill.style.width = '0%';
            audioElement.currentTime = 0;
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (event) => {
            // Cmd+Enter: Generate and play audio (manual text)
            if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
                event.preventDefault();
                // Only trigger if text input is focused or URL preview is ready
                if (document.activeElement === textInput || previewSection.classList.contains('visible')) {
                    if (previewSection.classList.contains('visible') && !generateAudioBtn.disabled) {
                        generateAudioBtn.click();
                    } else if (document.activeElement === textInput) {
                        playBtn.click();
                    }
                }
            }
            
            // Space: Pause/resume audio playback (only when audio player is visible)
            if (event.key === ' ' && customAudioPlayer.classList.contains('visible')) {
                // Don't trigger if typing in input fields
                if (document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
                    event.preventDefault();
                    if (!audioElement.paused) {
                        audioElement.pause();
                        updatePlayPauseIcon(false);
                    } else {
                        audioElement.play();
                        updatePlayPauseIcon(true);
                    }
                }
            }
        });

        // Initialize
        checkStatus();
    </script>
</body>
</html>
